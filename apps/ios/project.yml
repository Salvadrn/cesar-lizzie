name: AdaptAi
options:
  bundleIdPrefix: com.adaptai
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad only (NO Mac)

packages:
  AdaptAiKit:
    path: AdaptAiKit

targets:
  # ---- iOS App ----
  AdaptAi:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AdaptAi
    dependencies:
      - package: AdaptAiKit
      - target: AdaptAiWidgets
      - target: AdaptAiLiveActivity
      - target: AdaptAiIntents
    settings:
      base:
        INFOPLIST_FILE: AdaptAi/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.adaptai.app
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: false
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        CODE_SIGN_ENTITLEMENTS: AdaptAi/AdaptAi.entitlements
    entitlements:
      path: AdaptAi/AdaptAi.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.adaptai.shared
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.healthkit.background-delivery: true

  # ---- Apple Watch App ----
  AdaptAiWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: AdaptAiWatch
    dependencies:
      - package: AdaptAiKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adaptai.app.watchkitapp
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.adaptai.app
        GENERATE_INFOPLIST_FILE: YES
    scheme:
      testTargets: []

  # ---- WidgetKit Extension ----
  AdaptAiWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AdaptAiWidgets
        excludes:
          - Info.plist
    dependencies:
      - package: AdaptAiKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adaptai.app.widgets
        INFOPLIST_FILE: AdaptAiWidgets/Info.plist
    entitlements:
      path: AdaptAiWidgets/AdaptAiWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.adaptai.shared

  # ---- Live Activity ----
  AdaptAiLiveActivity:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AdaptAiLiveActivity
        excludes:
          - Info.plist
    dependencies:
      - package: AdaptAiKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adaptai.app.liveactivity
        INFOPLIST_FILE: AdaptAiLiveActivity/Info.plist

  # ---- App Intents Extension ----
  AdaptAiIntents:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AdaptAiIntents
        excludes:
          - Info.plist
    dependencies:
      - package: AdaptAiKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adaptai.app.intents
        INFOPLIST_FILE: AdaptAiIntents/Info.plist

schemes:
  AdaptAi:
    build:
      targets:
        AdaptAi: all
        AdaptAiWatch: all
        AdaptAiWidgets: all
        AdaptAiLiveActivity: all
        AdaptAiIntents: all
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
