name: neuronav_app
description: "NeuroNav - Adaptive Daily Living Assistant"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Backend
  supabase_flutter: ^2.9.0

  # Code Generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Auth
  sign_in_with_apple: ^6.1.3
  crypto: ^3.0.6

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.2

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Text-to-Speech
  flutter_tts: ^4.2.0

  # Haptics
  vibration: ^2.0.0

  # Location
  geolocator: ^13.0.2

  # Sensors (crash detection)
  sensors_plus: ^6.1.1

  # UI
  cached_network_image: ^3.4.1

  # Platform
  url_launcher: ^6.3.1
  device_info_plus: ^11.2.1
  package_info_plus: ^8.1.3

  # Formatting
  intl: ^0.20.2

  # Connectivity
  connectivity_plus: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.15
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
